<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nasida Attend | AI Face Attendance</title>
    <meta name="description" content="Next-generation attendance system powered by AI Face Recognition and Geofencing." />
    <meta name="author" content="Nasida Attend" />

    <!-- Open Graph / Social Branding -->
    <meta property="og:title" content="Nasida Attend" />
    <meta property="og:description" content="Secure, AI-powered attendance with Geofencing and Liveness Detection." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nasida Attend" />
    <meta name="twitter:description" content="AI-powered attendance with Geofencing." />

    <!-- Premium Splash Screen Styles -->
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        color: #fff;
        z-index: 9999;
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        transition: opacity 0.5s ease;
      }
      .logo-pulse {
        width: 80px;
        height: 80px;
        border: 4px solid #3b82f6;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }
      .app-title {
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin: 0;
        background: linear-gradient(to right, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .status-text {
        font-size: 0.75rem;
        color: rgba(255,255,255,0.4);
        margin-top: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* Hide splash when React loads */
      .app-loaded #splash-screen {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <!-- Premium Splash Screen -->
    <div id="splash-screen">
      <div class="logo-pulse"></div>
      <h1 class="app-title">Nasida Attend</h1>
      <p class="status-text">Synchronizing AI Core</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Automatically hide splash screen when root component is rendered
      const observer = new MutationObserver((mutations) => {
        if (document.getElementById('root')?.children.length > 0) {
          document.body.classList.add('app-loaded');
          observer.disconnect();
          setTimeout(() => {
            document.getElementById('splash-screen')?.remove();
          }, 500);
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
